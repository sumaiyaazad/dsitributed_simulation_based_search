syntax = "proto3";

package matchmaker;

service RegionalShard {
  //retrieves a list of players considered online at the time of the rpc being received
  rpc RequestPlayers (Empty) returns (PlayerList);

  //coordinator calls this rpc to tell shards which players are.
  rpc SendToMatch (MatchRequest) returns (Empty);

  //given a player ID, are they considered in matchmaking in this region?
  rpc IsOnline (PlayerID) returns (SimpleResponse);
}

//Server-coordinator service- rpcs facing servers, listening on coordinator
service CoordinatorServer {
  //Shards call this rpc to indicate they're listening for coordinator rpcs
  rpc Register (RegisterRequest) returns (SimpleResponse);
}

// --- Messages ---

message Empty {
  
}

message SimpleResponse {
  bool success = 1;
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  bool success = 1;
  string message = 2;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bool found = 1;
  string value = 2;
}

message PlayerID {
  uint64 id = 1;
}

message PlayerAttributes {
  PlayerID id = 1;
  //todo
}

message PlayerList {
  repeated PlayerAttributes playersOnline = 1;
}

message MatchRequest {
  PlayerList playersInMatch = 1;

  //amount of time shards must wait before putting the players in here back into matchmaking
  float matchTime = 2;
}

message RegisterRequest {
  string ip = 2;
  uint32 port = 3;
  //map<string, float> attributes = 4;
}