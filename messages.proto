syntax = "proto3";

service MatchmakerService {
  //retrieves a list of players considered online at the time of the rpc being received
  rpc RequestPlayers (Player) returns (PlayerList);

  //coordinator calls this rpc to tell shards which players are in a match.
  rpc ConfirmToMatch (PlayerList) returns (Status);

}

message Status {
  bool isOK = 1;
}

message Player {
  repeated float values = 1;
}

message PlayerList {
  repeated int64 playersIds = 1;
}